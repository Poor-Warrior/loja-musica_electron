<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../../node_modules/bootstrap/dist/css/bootstrap.css">
</head>
<body>
    <nav class="navbar navbar-expand navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">Home</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../cadastro/cadastro.html">Cadastro</a></li>
                <li class="nav-item"><a class="nav-link" href="./musica.html">Músicas</a></li>
                <li class="nav-item"><a class="nav-link" href="../estilo/estilo.html">Estilos</a></li>
                <li class="nav-item"><a class="nav-link" href="../artistas/artista.html">Artistas</a></li>
                <li class="nav-item"><a class="nav-link" href="../albuns/album.html">Álbuns</a></li>
                <li class="nav-item"><a class="nav-link" href="../gravadora/gravadora.html">Gravadoras</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="container mt-4">
        <h2>Gerenciar Músicas</h2>
        <div class="row mb-3">
            <div class="col">
                <input type="text" id="search" class="form-control" placeholder="Buscar música...">
            </div>
            <div class="col-auto">
                <button class="btn btn-primary" id="btnSearch">Buscar</button>
            </div>
        </div>
        <table class="table table-striped" id="table-musica">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Duração</th>
                    <th>Data Lançamento</th>
                    <th>Estilo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <nav>
            <ul class="pagination" id="pagination"></ul>
        </nav>
    </main>

    <div class="modal fade" id="editMusicaModal" tabindex="-1" aria-labelledby="editMusicaModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editMusicaModalLabel">Editar Música</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editMusicaForm">
                        <input type="hidden" id="editMusicaId">
                        <div class="mb-3">
                            <label for="editMusicaNome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="editMusicaNome" required>
                        </div>
                        <div class="mb-3">
                            <label for="editMusicaDuracao" class="form-label">Duração (ex: 03:30)</label>
                            <input type="text" class="form-control" id="editMusicaDuracao" required>
                        </div>
                        <div class="mb-3">
                            <label for="editMusicaData" class="form-label">Data de Lançamento</label>
                            <input type="date" class="form-control" id="editMusicaData" required>
                        </div>
                        <div class="mb-3">
                            <label for="editMusicaEstilo" class="form-label">Estilo</label>
                            <select class="form-control" id="editMusicaEstilo" required>
                                <option value="">Selecione...</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveMusicaEdit">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../node_modules/bootstrap/dist/js/bootstrap.js"></script>
    <script src="./rendererMusica.js"></script>
</body>
</html>
