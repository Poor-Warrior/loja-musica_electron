<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../../node_modules/bootstrap/dist/css/bootstrap.css">
</head>
<body>
    <nav class="navbar navbar-expand navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">Home</a>
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="../cadastro/cadastro.html">Cadastro</a></li>
                <li class="nav-item"><a class="nav-link" href="../musicas/musica.html">Músicas</a></li>
                <li class="nav-item"><a class="nav-link" href="../estilo/estilo.html">Estilos</a></li>
                <li class="nav-item"><a class="nav-link" href="./artista.html">Artistas</a></li>
                <li class="nav-item"><a class="nav-link" href="../albuns/album.html">Álbuns</a></li>
                <li class="nav-item"><a class="nav-link" href="../gravadora/gravadora.html">Gravadoras</a></li>
            </ul>
        </div>
    </nav>
    
    <main class="container mt-4">
        <h2>Gerenciar Artistas</h2>
        <div class="row mb-3">
            <div class="col">
                <input type="text" id="search" class="form-control" placeholder="Buscar artista...">
            </div>
            <div class="col-auto">
                <button class="btn btn-primary" id="btnSearch">Buscar</button>
            </div>
        </div>
        <table class="table table-striped" id="table-artista">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <nav>
            <ul class="pagination" id="pagination"></ul>
        </nav>
    </main>

    <div class="modal fade" id="editArtistaModal" tabindex="-1" aria-labelledby="editArtistaModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editArtistaModalLabel">Editar Artista</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="editArtistaForm">
                        <input type="hidden" id="editArtistaId">
                        <div class="mb-3">
                            <label for="editArtistaNome" class="form-label">Nome</label>
                            <input type="text" class="form-control" id="editArtistaNome" required>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveArtistaEdit">Salvar</button>
                </div>
            </div>
        </div>
    </div>      

    <script src="../../../node_modules/bootstrap/dist/js/bootstrap.js"></script>
    <script src="./redererArtista.js"></script>
</body>
</html>
